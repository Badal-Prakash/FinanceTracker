<div
  class="receipt-upload"
  [class.receipt-upload--dragover]="isDragOver()"
  [class.receipt-upload--disabled]="disabled"
>
  <!-- Error -->
  @if (error()) {
    <div class="upload-error">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      {{ error() }}
    </div>
  }

  <!-- No receipt yet — drop zone -->
  @if (!currentUrl() && !uploading()) {
    <label class="drop-zone" [class.drop-zone--dragover]="isDragOver()">
      <input
        type="file"
        accept=".jpg,.jpeg,.png,.webp,.heic,.pdf"
        (change)="onFileSelected($event)"
        [disabled]="disabled"
        class="drop-zone__input"
      />

      <div class="drop-zone__content">
        <div class="drop-zone__icon-wrap">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
            />
          </svg>
        </div>
        <p class="drop-zone__primary">
          <span class="drop-zone__link">Click to upload</span> or drag & drop
        </p>
        <p class="drop-zone__secondary">
          JPG, PNG, WebP, HEIC or PDF — max 10 MB
        </p>
      </div>
    </label>
  }

  <!-- Uploading — progress bar -->
  @if (uploading()) {
    <div class="upload-progress">
      <div class="upload-progress__header">
        <div class="upload-progress__file">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          <span>{{ previewName() }}</span>
        </div>
        <span class="upload-progress__pct">{{ uploadPercent() }}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" [style.width]="uploadPercent() + '%'"></div>
      </div>
      <p class="upload-progress__label">Uploading...</p>
    </div>
  }

  <!-- Receipt attached — preview -->
  @if (currentUrl() && !uploading()) {
    <div class="receipt-preview">
      <!-- Image preview -->
      @if (!isPdf(currentUrl())) {
        <div class="receipt-preview__image-wrap">
          <img
            [src]="currentUrl()!"
            alt="Receipt"
            class="receipt-preview__image"
          />
        </div>
      }

      <!-- PDF placeholder -->
      @if (isPdf(currentUrl())) {
        <div class="receipt-preview__pdf">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"
            />
          </svg>
          <span>PDF Receipt</span>
        </div>
      }

      <!-- Actions -->
      <div class="receipt-preview__actions">
        <a
          [href]="currentUrl()!"
          target="_blank"
          rel="noopener"
          class="preview-btn preview-btn--view"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
            />
          </svg>
          View
        </a>

        @if (!disabled) {
          <!-- Replace -->
          <label class="preview-btn preview-btn--replace">
            <input
              type="file"
              accept=".jpg,.jpeg,.png,.webp,.heic,.pdf"
              (change)="onFileSelected($event)"
              class="drop-zone__input"
            />
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
              />
            </svg>
            Replace
          </label>

          <!-- Remove -->
          <button
            type="button"
            (click)="removeReceipt()"
            [disabled]="removing()"
            class="preview-btn preview-btn--remove"
          >
            @if (removing()) {
              <svg class="spinner" fill="none" viewBox="0 0 24 24">
                <circle
                  class="spinner__track"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                />
                <path
                  class="spinner__fill"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                />
              </svg>
            } @else {
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                />
              </svg>
            }
            Remove
          </button>
        }
      </div>
    </div>
  }
</div>
